version: '3.9'
services:
  mongo:
    image: mongo:7
    container_name: inventory-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    container_name: inventory-api
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: inventory_db
      MONGO_COLLECTION_NAME: products
    ports:
      - "8000:8000"

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: inventory-uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime_kuma_data:/app/data

volumes:
  mongo_data:
  uptime_kuma_data:
